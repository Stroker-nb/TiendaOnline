
Server:
  port: ${PORT:8090}

spring:
  application:
    name: pago-service

  datasource:
    url: jdbc:h2:mem:pago_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

    h2:
      console:
        enabled: true
        path: /h2-console
    main:
      allow-bean-definition-overriding: true

springdoc:
      swagger-ui:
        path: /swagger-ui.html

logging:
      level:
        root: INFO
        org.springframework.web: WARN

eureka:
      client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
          defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
      instance:
        hostname: localhost

app:
  discovery:
    enabled: ${APP_DISCOVERY_ENABLED:true}

services:
  cliente:
    url: ${CLIENTE_SERVICE_URL:http://CLIENTE-SERVICE}
  pedido:
    url: ${PEDIDO_SERVICE_URL:http://PEDIDO-SERVICE}
