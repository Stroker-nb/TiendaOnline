services:

  - type: web
    name: tiendaonline-cliente
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/cliente-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: tiendaonline-producto
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/producto-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: tiendaonline-pedido
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/pedido-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://tiendaonline-cliente.onrender.com
      - key: PRODUCTO_SERVICE_URL
        value: https://tiendaonline-producto.onrender.com

  - type: web
    name: tiendaonline-pago
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/pago-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: PEDIDO_SERVICE_URL
        value: https://tiendaonline-pedido.onrender.com
      - key: CLIENTE_SERVICE_URL
        value: https://tiendaonline-cliente.onrender.com

  - type: web
    name: tiendaonline-envio
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/envio-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: PEDIDO_SERVICE_URL
        value: https://tiendaonline-pedido.onrender.com
      - key: CLIENTE_SERVICE_URL
        value: https://tiendaonline-cliente.onrender.com

  - type: web
    name: tiendaonline-auth
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/auth-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: tiendaonline-resena
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/resena-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://tiendaonline-cliente.onrender.com
      - key: PRODUCTO_SERVICE_URL
        value: https://tiendaonline-producto.onrender.com

  - type: web
    name: tiendaonline-distribuidor
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/distribuidor-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: PRODUCTO_SERVICE_URL
        value: https://tiendaonline-producto.onrender.com

  - type: web
    name: tiendaonline-sucursal
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/sucursal-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: tiendaonline-trabajador
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/trabajador-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: SUCURSAL_SERVICE_URL
        value: https://tiendaonline-sucursal.onrender.com

  - type: web
    name: tiendaonline-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/api-gateway.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://tiendaonline-cliente.onrender.com
      - key: PRODUCTO_SERVICE_URL
        value: https://tiendaonline-producto.onrender.com
      - key: PEDIDO_SERVICE_URL
        value: https://tiendaonline-pedido.onrender.com
      - key: PAGO_SERVICE_URL
        value: https://tiendaonline-pago.onrender.com
      - key: ENVIO_SERVICE_URL
        value: https://tiendaonline-envio.onrender.com
      - key: AUTH_SERVICE_URL
        value: https://tiendaonline-auth.onrender.com
      - key: RESENA_SERVICE_URL
        value: https://tiendaonline-resena.onrender.com
      - key: DISTRIBUIDOR_SERVICE_URL
        value: https://tiendaonline-distribuidor.onrender.com
      - key: SUCURSAL_SERVICE_URL
        value: https://tiendaonline-sucursal.onrender.com
      - key: TRABAJADOR_SERVICE_URL
        value: https://tiendaonline-trabajador.onrender.com