
server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:mem:auth_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

  main:
    allow-bean-definition-overriding: true

jwt:
   secret: ClaveMegaSuperHiperSeguraJWTParaTiendaOnline2026DeIgnacioyVicente
   expiration-ms: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
    level:
      cl.duoc.fullstack: INFO
      org.springframework.web: WARN

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  discovery:
    enabled: ${APP_DISCOVERY_ENABLED:true}

services:
  pedido:
    url: ${PEDIDO_SERVICE_URL:http://PEDIDO-SERVICE}
