
server:
  port: ${PORT:8084}

spring:
  application:
    name: distribuidor-service

  datasource:
    url: jdbc:h2:mem:distribuidor_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

  main:
    allow-bean-definition-overriding: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.web: WARN

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    instance:
      prefer-ip-address: true


app:
  discovery:
    enabled: ${APP_DISCOVERY_ENABLED:true}

services:
  pedido:
    url: ${PEDIDO_SERVICE_URL:http://PRODUCTO-SERVICE}

