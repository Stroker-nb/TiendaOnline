services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - cliente-service
      - producto-service
      - distribuidor-service
      - sucursal-service
      - trabajador-service
      - pedido-service
      - resena-service
      - envio-service
      - pago-service

    environment:
      - EUREKA_ENABLED=false
      - AUTH_SERVICE_URL=http://auth-service:8081
      - CLIENTE_SERVICE_URL=http://cliente-service:8082
      - PRODUCTO_SERVICE_URL=http://producto-service:8083
      - DISTRIBUIDOR_SERVICE_URL=http://distribuidor-service:8084
      - SUCURSAL_SERVICE_URL=http://sucursal-service:8085
      - TRABAJADOR_SERVICE_URL=http://trabajador-service:8086
      - PEDIDO_SERVICE_URL=http://pedido-service:8087
      - RESENA_SERVICE_URL=http://resena-service:8088
      - ENVIO_SERVICE_URL=http://envio-service:8089
      - PAGO_SERVICE_URL=http://pago-service:8090


  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  cliente-service:
    build: ./cliente-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  producto-service:
    build: ./producto-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  distribuidor-service:
    build: ./distribuidor-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - producto-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  sucursal-service:
    build: ./distribuidor-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  trabajador-service:
    build: ./trabajador-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
      - sucursal-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  pedido-service:
    build: ./pedido-service
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
      - producto-service
      - cliente-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  resena-service:
    build: ./resena-service
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
      - producto-service
      - cliente-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  envio-service:
    build: ./envio-service
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
      - pedido-service
      - cliente-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  pago-service:
    build: ./envio-service
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
      - pedido-service
      - cliente-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
